services:
  # --- Backend Web Service ---
  - type: web
    name: annapurna-backend
    env: python

    buildCommand: |
      pip install -r requirements.txt
    startCommand: gunicorn --workers=4 --chdir backend run:app

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: annapurna-db
          property: connectionString

      - key: PYTHON_VERSION
        value: 3.11.9

      - key: PYTHONPATH
        value: backend

      - key: FLASK_ENV
        value: production

      - key: SECRET_KEY
        generateValue: true

      - key: FIREBASE_CREDENTIALS_JSON
        sync: false

      - key: CORS_ORIGINS
        value: "*"

# --- PostgreSQL Database ---
databases:
  - name: annapurna-db
    plan: free
