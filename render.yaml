services:
  # --- Backend Web Service ---
  - type: web
    name: annapurna-backend
    env: python
    buildCommand: pip install -r requirements.txt && python -m ml_models.training.train_model --mode csv
    startCommand: gunicorn --workers=4 --chdir backend run:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: annapurna-db
          property: connectionString
      - key: PYTHONPATH
        value: backend
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false # You will paste this manually in the Render UI for security
      - key: CORS_ORIGINS
        value: "*" # Update this to your Vercel URL later

# --- PostgreSQL Database ---
databases:
  - name: annapurna-db
    plan: free # Note: Render free tier DBs expire after 90 days
